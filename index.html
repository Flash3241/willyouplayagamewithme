<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: var(--font-sans);
  }
  
  .container {
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2rem 1.5rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
  
  .page {
    display: none;
    width: 100%;
    text-align: center;
  }
  
  .page.active {
    display: block;
    animation: fadeIn 0.3s ease-in;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  
  .card {
    background: white;
    border-radius: 24px;
    padding: 2.5rem 2rem;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }
  
  h1 {
    font-size: 32px;
    font-weight: 600;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1.5rem;
    line-height: 1.3;
  }
  
  .emoji {
    font-size: 4rem;
    margin-bottom: 1.5rem;
    display: block;
  }
  
  .button-group {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 2.5rem;
  }
  
  button {
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    min-width: 120px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  #yesBtn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
  }
  
  #yesBtn:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(102, 126, 234, 0.6);
  }
  
  #noBtn {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: white;
    position: relative;
    transition: none;
    box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
  }
  
  #noBtn:hover {
    box-shadow: 0 12px 30px rgba(245, 87, 108, 0.6);
  }
  
  .schedule-section {
    margin-top: 2rem;
    text-align: left;
  }
  
  .schedule-section h3 {
    color: #667eea;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 1rem;
  }
  
  select {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 2px solid #e0e0f0;
    border-radius: 12px;
    background: white;
    color: #667eea;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23667eea' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/csvg%3e");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 20px;
    padding-right: 40px;
    margin-bottom: 1.5rem;
  }
  
  select:hover {
    border-color: #667eea;
    background-color: #f8f6ff;
  }
  
  select:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }
  
  .confirm-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 1.5rem;
  }
  
  .confirm-btn:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(245, 87, 108, 0.4);
  }
  
  .confirm-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  
  .final-message {
    font-size: 40px;
    font-weight: 700;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 2rem 0;
    letter-spacing: -1px;
  }
  
  .subtitle {
    color: #999;
    font-size: 15px;
    margin-bottom: 1.5rem;
  }
  
  .details-box {
    background: #f0f0f8;
    border: 2px solid #e0e0f0;
    border-radius: 12px;
    padding: 1.5rem;
    margin: 1.5rem 0;
    text-align: left;
  }
  
  .detail-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    font-size: 15px;
  }
  
  .detail-row:last-child {
    margin-bottom: 0;
  }
  
  .detail-label {
    color: #667eea;
    font-weight: 600;
  }
  
  .detail-value {
    color: #333;
    font-weight: 500;
  }
</style>

<div class="container">
  
  <div id="page1" class="page active">
    <div class="card">
      <span class="emoji"><p>&#128512;</p></span>
      <h1>Will you play a game with me</h1>
      <div class="button-group">
        <button id="yesBtn" onclick="handleYes()">Yes!</button>
        <button id="noBtn">No way</button>
      </div>
    </div>
  </div>
  
  <div id="page2" class="page">
    <div class="card">
      <span class="emoji"><p>&#128197;</p></span>
      <h1>Pick a time to play!</h1>
      <p class="subtitle">Choose your day and preferred time</p>
      
      <div class="schedule-section">
        <h3><p>&#128197;</p> Select Day</h3>
        <select id="daySelect" onchange="selectDay()">
          <option value="">-- Choose a day --</option>
          <option value="Today">Today</option>
          <option value="Tomorrow">Tomorrow</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
          <option value="Sunday">Sunday</option>
          <option value="Next Mon">Next Mon</option>
          <option value="Next Tue">Next Tue</option>
          <option value="Next Wed">Next Wed</option>
        </select>
      </div>
      
      <div class="schedule-section">
        <h3><p>&#9200;</p> Select Time</h3>
        <select id="timeSelect" onchange="selectTime()">
          <option value="">-- Choose a time --</option>
          <option value="1:00 PM">1:00 PM</option>
          <option value="2:00 PM">2:00 PM</option>
          <option value="3:00 PM">3:00 PM</option>
          <option value="4:00 PM">4:00 PM</option>
          <option value="5:00 PM">5:00 PM</option>
          <option value="6:00 PM">6:00 PM</option>
          <option value="7:00 PM">7:00 PM</option>
          <option value="8:00 PM">8:00 PM</option>
          <option value="9:00 PM">9:00 PM</option>
          <option value="10:00 PM">10:00 PM</option>
          <option value="11:00 PM">11:00 PM</option>
          <option value="12:00 AM">12:00 AM</option>
        </select>
      </div>
      
      <button class="confirm-btn" id="confirmBtn" onclick="handleConfirm()" disabled>Confirm Playtime</button>
    </div>
  </div>
  
  <div id="page3" class="page">
    <div class="card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
      <span class="emoji"><p>&#127942;</p></span>
      <h1 style="color: white; -webkit-text-fill-color: white;">play soon,<br>get ready to lose</h1>
      
      <div class="details-box" style="background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3);">
        <div class="detail-row">
          <span class="detail-label" style="color: rgba(255,255,255,0.9);">📆 Day</span>
          <span class="detail-value" style="color: white;" id="confirmDay"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label" style="color: rgba(255,255,255,0.9);">⏰ Time</span>
          <span class="detail-value" style="color: white;" id="confirmTime"></span>
        </div>
      </div>
      
      <p style="color: rgba(255,255,255,0.9); font-size: 15px; margin-top: 1.5rem;">Charisma applied! See you soon! <p>&#128572;</p></p>
    </div>
  </div>
  
</div>

<script>
  const YOUR_EMAIL = "alexy7162@gmail.com";
  
  let selectedDay = null;
  let selectedTime = null;
  
  const noBtn = document.getElementById('noBtn');
  const confirmBtn = document.getElementById('confirmBtn');
  const daySelect = document.getElementById('daySelect');
  const timeSelect = document.getElementById('timeSelect');
  
  document.addEventListener('mousemove', (e) => {
    if (document.getElementById('page1').classList.contains('active')) {
      const rect = noBtn.getBoundingClientRect();
      const btnCenterX = rect.left + rect.width / 2;
      const btnCenterY = rect.top + rect.height / 2;
      
      const mouseX = e.clientX;
      const mouseY = e.clientY;
      
      const distX = mouseX - btnCenterX;
      const distY = mouseY - btnCenterY;
      const distance = Math.sqrt(distX * distX + distY * distY);
      
      if (distance < 130) {
        const angle = Math.atan2(distY, distX);
        const moveDistance = 130 - distance;
        const moveX = Math.cos(angle + Math.PI) * moveDistance * 0.85;
        const moveY = Math.sin(angle + Math.PI) * moveDistance * 0.85;
        
        noBtn.style.transform = `translate(${moveX}px, ${moveY}px)`;
      } else {
        noBtn.style.transform = 'translate(0, 0)';
      }
    }
  });
  
  function handleYes() {
    document.getElementById('page1').classList.remove('active');
    document.getElementById('page2').classList.add('active');
  }
  
  function selectDay() {
    selectedDay = daySelect.value;
    updateConfirmButton();
  }
  
  function selectTime() {
    selectedTime = timeSelect.value;
    updateConfirmButton();
  }
  
  function updateConfirmButton() {
    if (selectedDay && selectedTime) {
      confirmBtn.disabled = false;
    } else {
      confirmBtn.disabled = true;
    }
  }
  
  function handleConfirm() {
    if (selectedDay && selectedTime) {
      sendEmail();
      document.getElementById('page2').classList.remove('active');
      document.getElementById('page3').classList.add('active');
      
      document.getElementById('confirmDay').textContent = selectedDay;
      document.getElementById('confirmTime').textContent = selectedTime;
    }
  }
  
  function sendEmail() {
    const formData = new FormData();
    formData.append('email', YOUR_EMAIL);
    formData.append('subject', '<p>&#128512;</p> Game Challenge Scheduled!');
    formData.append('message', `New game scheduled!\n\nDay: ${selectedDay}\nTime: ${selectedTime}\n\nGet ready for an epic match! 👾`);
    
    fetch('https://formspree.io/f/xyzqwert', {
      method: 'POST',
      body: formData
    }).catch(error => {
      console.log('Email sent');
    });
  }
  
  noBtn.addEventListener('click', () => {
    alert('Ha! You can\'t escape that easily! 😄');
  });
</script>
